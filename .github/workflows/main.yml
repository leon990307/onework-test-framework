name: UI E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ui-e2e:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: onework-ui-e2e-ready

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build demo app
        run: npm run build:demo

      - name: Run E2E (packaged exe)
        run: npx playwright test tests/e2e/packaged-app-launch.spec.ts --reporter=line,html

      - name: Run E2E (dev mode smoke)
        env:
          ELECTRON_MAIN_ENTRY: demo-electron-app/main.js
        run: npx playwright test tests/e2e/smoke --reporter=line,html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            onework-ui-e2e-ready/playwright-report
            onework-ui-e2e-ready/test-results
